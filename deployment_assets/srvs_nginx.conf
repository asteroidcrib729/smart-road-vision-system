# ==============================================================================
# SRVS V4 Nginx SSL Reverse Proxy Configuration
# ==============================================================================
# Place this file in /etc/nginx/sites-available/srvs
# Link it to sites-enabled: sudo ln -s /etc/nginx/sites-available/srvs /etc/nginx/sites-enabled/
# ==============================================================================

server {
    listen 80;
    server_name your-domain.duckdns.org; # Replace with your actual domain/subdomain

    # Let's Encrypt / Certbot Challenge Directory
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name your-domain.duckdns.org; # Replace with your actual domain/subdomain

    # SSL Certificates (will be generated by Certbot)
    ssl_certificate /etc/letsencrypt/live/your-domain.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.duckdns.org/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Max upload size (for video files)
    client_max_body_size 100M;

    # API Proxy Routing
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Server-Sent Events (SSE) Route Setup
    # Custom headers are REQUIRED to prevent Nginx from caching/buffering the live events stream
    location /api/stream/events {
        proxy_pass http://127.0.0.1:8000/api/stream/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        
        # Disable buffering and cache for SSE stream
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        
        # Keep connection open for streaming logs
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
