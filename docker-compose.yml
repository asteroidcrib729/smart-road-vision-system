version: '3.8'

services:
  srvs-backend:
    build:
      context: ./srvs-backend-core
      dockerfile: Dockerfile
    container_name: srvs-backend-container
    ports:
      - "8000:8000"
    env_file:
      - ./srvs-backend-core/.env
    volumes:
      # Persist SQLite databases, generated images, and downloaded videos on host
      - ./srvs-backend-core/output:/app/output
      - ./srvs-backend-core/data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
